site_name: k8s-ftp
site_description: 사내망 전용 Plain FTP 서비스 (vsftpd 단일 Pod + NAS PVC + 가상 사용자)
site_url: https://nineking424.github.io/k8s-ftp/
repo_name: nineking424/k8s-ftp
repo_url: https://github.com/nineking424/k8s-ftp

docs_dir: docs

theme:
  name: readthedocs
  navigation_depth: 3

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

plugins:
  - search
  - mermaid2

strict: true

exclude_docs: |
  superpowers/

nav:
  - 개요: index.md
  - 개념:
      - 개요: concepts/index.md
      - 아키텍처: concepts/architecture.md
  - 운영:
      - 개요: operating/index.md
      - 사용자 관리: operating/user-management.md
      - 운영 절차: operating/maintenance.md
      - 테스트와 검증: operating/testing.md
      - 용량과 한계: operating/capacity.md
      - 모니터링: operating/monitoring.md
      - 트러블슈팅: operating/troubleshooting.md
  - 개발자:
      - 개요: developer/index.md
      - 코드 맵: developer/code-map.md
  - FAQ: faq.md
  - 용어집: glossary.md
