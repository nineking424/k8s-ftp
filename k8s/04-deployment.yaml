apiVersion: apps/v1
kind: Deployment
metadata:
  name: vsftpd
  namespace: ftp
  labels:
    app: vsftpd
spec:
  replicas: 1
  strategy:
    type: Recreate                    # 단일 Pod, 충돌 방지
  selector:
    matchLabels:
      app: vsftpd
  template:
    metadata:
      labels:
        app: vsftpd
    spec:
      containers:
        - name: vsftpd
          image: ghcr.io/nineking424/k8s-ftp:v0.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: PASV_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: vsftpd-config
                  key: PASV_ADDRESS
          ports:
            - name: ftp-ctrl
              containerPort: 21
              protocol: TCP
            # PASV 포트는 named로 일일이 나열 불가. Service 측에서 처리.
          volumeMounts:
            - name: ftp-data
              mountPath: /srv/ftp
            - name: users-secret
              mountPath: /var/run/users
              readOnly: true
            - name: shared
              mountPath: /shared
            - name: run
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
              # vsftpd가 ftpvirt로 권한을 떨굴 때 setgroups/setuid 필요,
              # entrypoint가 사용자별 디렉토리 chown 수행
              add: [NET_BIND_SERVICE, SYS_CHROOT, SETUID, SETGID, CHOWN]
          livenessProbe:
            tcpSocket:
              port: 21
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 21
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
        - name: user-syncer
          image: ghcr.io/nineking424/k8s-ftp:v0.1.1
          imagePullPolicy: IfNotPresent
          command: ["/user-syncer.sh"]
          volumeMounts:
            - name: ftp-data
              mountPath: /srv/ftp
            - name: users-secret
              mountPath: /var/run/users
              readOnly: true
            - name: shared
              mountPath: /shared
            - name: run-syncer
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: ftp-data
          persistentVolumeClaim:
            claimName: ftp-data
        - name: users-secret
          secret:
            secretName: vsftpd-users
            items:
              - key: users.txt
                path: users.txt
        - name: shared
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: run-syncer
          emptyDir: {}
